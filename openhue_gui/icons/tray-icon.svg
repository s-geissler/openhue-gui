<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bulbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF6B00"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#FFEB3B;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="32" cy="26" rx="20" ry="18" fill="url(#glowGrad)" opacity="0.6"/>

  <!-- Lightbulb body -->
  <path d="M32 8 C18 8 14 20 14 28 C14 34 18 38 20 40 L20 46 L44 46 L44 40 C46 38 50 34 50 28 C50 20 46 8 32 8 Z"
        fill="url(#bulbGrad)" stroke="#E65100" stroke-width="1.5"/>

  <!-- Inner glow -->
  <ellipse cx="32" cy="26" rx="12" ry="10" fill="url(#centerGlow)"/>

  <!-- Bulb base/screw -->
  <rect x="22" y="46" width="20" height="4" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="24" y="50" width="16" height="3" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="26" y="53" width="12" height="3" rx="1.5" fill="#607D8B" stroke="#546E7A" stroke-width="0.5"/>

  <!-- Highlight -->
  <ellipse cx="26" cy="20" rx="4" ry="3" fill="white" opacity="0.4"/>
</svg>